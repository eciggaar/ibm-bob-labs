<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Copy Button</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
    }
    
    .prose pre {
      position: relative;
      background-color: rgb(249, 250, 251);
      border: 1px solid rgb(229, 231, 235);
      border-radius: 0.75rem;
      padding: 1rem;
      padding-right: 3.5rem;
      overflow-x: auto;
      margin: 1.5rem 0;
      box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05);
    }
    
    .prose pre code {
      background-color: transparent;
      color: rgb(17, 24, 39);
      padding: 0;
      border: none;
      border-radius: 0;
      font-size: 0.8125rem;
      line-height: 1.5;
      font-family: monospace;
      font-weight: 400;
    }
    
    .prose pre .copy-code-button {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.5rem;
      color: rgb(107, 114, 128);
      background-color: rgb(255, 255, 255);
      border: 1px solid rgb(229, 231, 235);
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 10;
    }
    
    .prose pre .copy-code-button:hover {
      color: rgb(17, 24, 39);
      background-color: rgb(243, 244, 246);
    }
    
    .prose pre .copy-code-button:focus {
      outline: 2px solid rgb(59, 130, 246);
      outline-offset: 2px;
    }
    
    .prose pre .copy-code-button svg {
      width: 1rem;
      height: 1rem;
    }
    
    .prose pre .copy-code-button .copy-icon,
    .prose pre .copy-code-button .success-icon {
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .prose pre .copy-code-button .success-icon {
      display: none;
    }
    
    .prose pre .copy-code-button.copied .copy-icon {
      display: none;
    }
    
    .prose pre .copy-code-button.copied .success-icon {
      display: flex;
    }
  </style>
</head>
<body>
  <h1>Test Copy Button with Flowbite Icons</h1>
  
  <div class="prose">
    <p>Here's a code block with a copy button:</p>
    
    <pre><code>git clone -b bob-learning-path-branch https://github.com/IBM/galaxium-travels</code></pre>
    
    <p>Another code block:</p>
    
    <pre><code>npm install
npm run dev</code></pre>
  </div>
  
  <script>
    function setupCopyButtons() {
      document.querySelectorAll('.prose pre').forEach((pre) => {
        if (pre.querySelector('.copy-code-button')) return;
        
        const code = pre.querySelector('code');
        if (!code) return;
        
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'copy-code-button';
        button.setAttribute('aria-label', 'Copy code to clipboard');
        
        const copyIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        copyIcon.setAttribute('class', 'copy-icon');
        copyIcon.setAttribute('aria-hidden', 'true');
        copyIcon.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        copyIcon.setAttribute('fill', 'currentColor');
        copyIcon.setAttribute('viewBox', '0 0 18 20');
        copyIcon.innerHTML = '<path d="M16 1h-3.278A1.992 1.992 0 0 0 11 0H7a1.993 1.993 0 0 0-1.722 1H2a2 2 0 0 0-2 2v15a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2Zm-3 14H5a1 1 0 0 1 0-2h8a1 1 0 0 1 0 2Zm0-4H5a1 1 0 0 1 0-2h8a1 1 0 1 1 0 2Zm0-5H5a1 1 0 0 1 0-2h2V2h4v2h2a1 1 0 1 1 0 2Z"/>';
        
        const successIcon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        successIcon.setAttribute('class', 'success-icon');
        successIcon.setAttribute('aria-hidden', 'true');
        successIcon.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
        successIcon.setAttribute('fill', 'none');
        successIcon.setAttribute('viewBox', '0 0 16 12');
        successIcon.innerHTML = '<path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 5.917 5.724 10.5 15 1.5"/>';
        
        button.appendChild(copyIcon);
        button.appendChild(successIcon);
        
        button.addEventListener('click', async (e) => {
          e.stopPropagation();
          try {
            await navigator.clipboard.writeText(code.textContent || '');
            button.classList.add('copied');
            button.setAttribute('aria-label', 'Code copied to clipboard');
            setTimeout(() => {
              button.classList.remove('copied');
              button.setAttribute('aria-label', 'Copy code to clipboard');
            }, 2000);
          } catch (err) {
            console.error('Failed to copy code:', err);
          }
        });
        
        pre.appendChild(button);
      });
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', setupCopyButtons);
    } else {
      setupCopyButtons();
    }
  </script>
</body>
</html>
